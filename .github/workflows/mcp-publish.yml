name: Publish MCP Server to npm

on:
  push:
    tags:
      - 'mcp-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm tsc --noEmit
      - run: pnpm test

      # Build @orbit-cli/core first (peer dependency)
      - run: pnpm --filter @orbit-cli/core build

      # Build and publish @orbit-cli/mcp
      - run: pnpm --filter @orbit-cli/mcp build

      - run: pnpm --filter @orbit-cli/mcp publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
